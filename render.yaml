# NOTE: the LIVE backend is the pre-existing Render service `agentforge-api`
# (srv-d6o6h36a2pns73d314s0), re-linked to this repo on 2026-07-15 with
# auto-deploy on commit. This blueprint's `forge-api` name is what a fresh
# `render blueprint launch` would create — it is not the running service.
services:
  - type: web
    name: forge-api
    runtime: python
    repo: https://github.com/AaronCx/Forge
    branch: main
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Required: encrypts provider API keys at rest. Without it, encrypt_secret
      # silently passes through and keys are stored plaintext in api_key_encrypted.
      - key: FORGE_ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://forge-six.vercel.app
