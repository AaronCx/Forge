name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"
      - uses: actions/cache@v6
        with:
          path: frontend/node_modules
          key: bun-${{ hashFiles('frontend/bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"
      - uses: actions/cache@v6
        with:
          path: frontend/node_modules
          key: bun-${{ hashFiles('frontend/bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run test

  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check app/ --config ../ruff.toml
      - run: mypy app/ --config-file mypy.ini
      # Parity safety net runs first and fails fast (docs/harness-plan.md Phase 0).
      - name: Parity safety net
        run: FORGE_TESTING=1 pytest tests/parity/ -q
      - run: pytest tests/ -v --cov=app

  frontend-e2e:
    name: Demo Parity Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_FORCE_DEMO: "true"
      CI: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"
      - uses: actions/cache@v6
        with:
          path: frontend/node_modules
          key: bun-${{ hashFiles('frontend/bun.lock') }}
      - run: bun install --frozen-lockfile
      - run: bun run test:e2e:install
      - run: bun run build
      - run: bun run test:e2e
